# /etc/nginx/sites-available/sasoori
# Symlink: ln -s /etc/nginx/sites-available/sasoori /etc/nginx/sites-enabled/sasoori

upstream sasoori_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sasoori.com www.sasoori.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sasoori.com www.sasoori.com;

    # ── SSL (Let's Encrypt via Certbot) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/sasoori.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sasoori.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_proxied    any;
    gzip_types      text/css text/javascript application/javascript
                    application/json image/svg+xml;

    # ── Security headers (additional, on top of Java SecurityHeadersFilter) ─
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Defined in nginx.conf http block: limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    location /api/v1/auth/otp {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://sasoori_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://sasoori_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Static frontend ───────────────────────────────────────────────────────
    root /var/www/sasoori/frontend;

    # HTML — no-cache so SPA shell is always fresh
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Versioned assets (CSS/JS/images) — very long cache
    location /assets/ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
