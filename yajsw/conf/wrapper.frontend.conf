#********************************************************************
# Sasoori Frontend — YAJSW wrapper configuration
# Runs: npx serve frontend -p 3000
# (plain static file server — no build step needed)
#********************************************************************

#--------------------------------------------------------------------
# This is a Node.js process, not a JVM app.
# YAJSW wraps it as a native/script application.
#--------------------------------------------------------------------
wrapper.java.command = C:\Program Files\Java\jdk-17\bin\java.exe

wrapper.working.dir = E:\Work\Sasoori

#--------------------------------------------------------------------
# Run via cmd.exe so Node/npx PATH is resolved correctly
#--------------------------------------------------------------------
wrapper.app.parameter.1 = C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe
wrapper.app.parameter.2 = -NoProfile
wrapper.app.parameter.3 = -Command
wrapper.app.parameter.4 = npx serve frontend -p 3000 --no-clipboard

#--------------------------------------------------------------------
# Process name & description (shown in Windows Services)
#--------------------------------------------------------------------
wrapper.ntservice.name        = SasooriFrontend
wrapper.ntservice.displayname = Sasoori Frontend (serve)
wrapper.ntservice.description = Sasoori e-commerce static frontend on port 3000
wrapper.ntservice.starttype   = DEMAND_START

#--------------------------------------------------------------------
# Logging
#--------------------------------------------------------------------
wrapper.logfile             = E:\Work\Sasoori\yajsw\log\frontend.log
wrapper.logfile.maxsize     = 10m
wrapper.logfile.maxfiles    = 3
wrapper.logfile.loglevel    = INFO
wrapper.console.loglevel    = INFO
wrapper.syslog.loglevel     = NONE

#--------------------------------------------------------------------
# Restart on crash
#--------------------------------------------------------------------
wrapper.on_exit.default     = RESTART
wrapper.on_exit.0           = SHUTDOWN
wrapper.restart.delay       = 3

wrapper.startup.timeout     = 30
wrapper.ping.timeout        = 15
