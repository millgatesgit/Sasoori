#********************************************************************
# Sasoori Backend — YAJSW wrapper configuration
# Runs: mvn jetty:run (via Maven/Plexus class-worlds launcher)
#********************************************************************

#--------------------------------------------------------------------
# Java executable
#--------------------------------------------------------------------
wrapper.java.command = C:\Program Files\Java\jdk-17\bin\java.exe

#--------------------------------------------------------------------
# Working directory (project root)
#--------------------------------------------------------------------
wrapper.working.dir = E:\Work\Sasoori

#--------------------------------------------------------------------
# Maven entry-point (plexus-classworlds launcher)
#--------------------------------------------------------------------
wrapper.java.app.mainclass = org.codehaus.plexus.classworlds.launcher.Launcher

wrapper.java.classpath.1 = C:\Program Files\NetBeans-23\netbeans\java\maven\boot\plexus-classworlds-2.8.0.jar

#--------------------------------------------------------------------
# JVM arguments
#--------------------------------------------------------------------
# PipeFix: disable AF_UNIX in PipeImpl so NIO Selector uses TCP loopback
# (required on this Windows machine — Fortinet blocks AF_UNIX connect)
wrapper.java.additional.1 = -javaagent:E:\Work\Sasoori\pipefix.jar

# Maven internals
wrapper.java.additional.2 = -Dclassworlds.conf=C:\Program Files\NetBeans-23\netbeans\java\maven\bin\m2.conf
wrapper.java.additional.3 = -Dmaven.home=C:\Program Files\NetBeans-23\netbeans\java\maven
wrapper.java.additional.4 = -Dmaven.multiModuleProjectDirectory=E:\Work\Sasoori
wrapper.java.additional.5 = -Dlibrary.jansi.path=C:\Program Files\NetBeans-23\netbeans\java\maven\lib\jansi-native
wrapper.java.additional.6 = -Dfile.encoding=UTF-8

#--------------------------------------------------------------------
# Maven goal + Jetty port
#--------------------------------------------------------------------
wrapper.java.app.parameter.1 = jetty:run
wrapper.java.app.parameter.2 = -Dserver.port=9090

#--------------------------------------------------------------------
# Application environment variables
#--------------------------------------------------------------------
wrapper.app.env.DB_URL           = jdbc:postgresql://localhost:5432/sasoori_db
wrapper.app.env.DB_USER          = sasoori
wrapper.app.env.DB_PASSWORD      = sasoori123
wrapper.app.env.GOOGLE_CLIENT_ID = dev
wrapper.app.env.GOOGLE_CLIENT_SECRET = dev
wrapper.app.env.FRONTEND_URL     = http://localhost:3000,http://localhost:5500
wrapper.app.env.SECURE_COOKIE    = false
wrapper.app.env.DEV_MODE         = true
wrapper.app.env.JAVA_HOME        = C:\Program Files\Java\jdk-17

#--------------------------------------------------------------------
# Process name & description (shown in Windows Services)
#--------------------------------------------------------------------
wrapper.ntservice.name        = SasooriBackend
wrapper.ntservice.displayname = Sasoori Backend (Jetty)
wrapper.ntservice.description = Sasoori e-commerce backend on port 9090
wrapper.ntservice.starttype   = DEMAND_START

#--------------------------------------------------------------------
# Logging
#--------------------------------------------------------------------
wrapper.logfile             = E:\Work\Sasoori\yajsw\log\backend.log
wrapper.logfile.maxsize     = 10m
wrapper.logfile.maxfiles    = 3
wrapper.logfile.loglevel    = INFO
wrapper.console.loglevel    = INFO
wrapper.syslog.loglevel     = NONE

#--------------------------------------------------------------------
# Restart on crash
#--------------------------------------------------------------------
wrapper.on_exit.default     = RESTART
wrapper.on_exit.0           = SHUTDOWN
wrapper.restart.delay       = 5

#--------------------------------------------------------------------
# Startup detection — wait for "Started ServerConnector" in stdout
#--------------------------------------------------------------------
wrapper.startup.timeout     = 120
wrapper.ping.timeout        = 30
